name: Deploy cargo-report to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/github-source-in-setup-6f5x8g
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cargo-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
